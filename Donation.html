    <main class="donation-container">
        <form class="donation-box">
            <h2>Make a Donation</h2>
            <p class="sub">Support those in need this Eid al-Adha</p>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email Address</label>
            <input type="email" placeholder="your.email@example.com" required>

            <label>Donation Amount</label>
            <input type="text" placeholder="$100" required>

            <label>Message</label>
            <textarea rows="3" placeholder="Leave a message (optional)"></textarea>

            <button type="submit">Submit Donation</button>
        </form>
    </main>
